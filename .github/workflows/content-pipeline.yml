name: Weekly Content Pipeline

on:
  # Run every Monday at 9 AM UTC (adjust as needed)
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        NICHE: ${{ secrets.NICHE || 'AI Technology' }}
      run: |
        cat > .env << EOF
        OPENAI_API_KEY=$OPENAI_API_KEY
        PERPLEXITY_API_KEY=$PERPLEXITY_API_KEY
        ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY
        GOOGLE_DRIVE_CREDENTIALS=$GOOGLE_DRIVE_CREDENTIALS
        TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
        TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
        NICHE=$NICHE
        EOF

    - name: Run content generation pipeline
      run: |
        python main.py
      continue-on-error: true

    - name: Upload outputs as artifact
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: content-output
        path: output/
        retention-days: 30

    - name: Notify on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '❌ Content pipeline failed. Check workflow logs.'
          })
